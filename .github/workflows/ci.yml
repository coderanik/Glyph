name: Code Quality CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Install Server Dependencies
        working-directory: ./server
        run: npm install

      - name: Lint Frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Type Check Server
        working-directory: ./server
        run: npx tsc --noEmit

      - name: Build Server
        working-directory: ./server
        run: npm run build

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build Docker Compiler Image
        working-directory: ./docker
        run: docker build -t glyph-compiler .
