services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: glyph
      POSTGRES_PASSWORD: glyph_password
      POSTGRES_DB: glyph
    ports:
      # Use 5433 on the host so a local Postgres on 5432 does not shadow this service.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "${PORT:-8083}:${PORT:-8083}"
    environment:
      - DATABASE_URL=postgresql://glyph:glyph_password@db:5432/glyph
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - PORT=${PORT:-8083}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - db

  compile-worker:
    build:
      context: .
      dockerfile: server/Dockerfile.worker
    environment:
      - DATABASE_URL=postgresql://glyph:glyph_password@db:5432/glyph
    depends_on:
      - db

volumes:
  pgdata:
