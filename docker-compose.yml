version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: glyph
      POSTGRES_PASSWORD: glyph_password
      POSTGRES_DB: glyph
    ports:
      # Use 5433 on the host so a local Postgres on 5432 does not shadow this service.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
