services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: glyph
      POSTGRES_PASSWORD: glyph_password
      POSTGRES_DB: glyph
    ports:
      # Use 5433 on the host so a local Postgres on 5432 does not shadow this service.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgres://glyph:glyph_password@db:5432/glyph
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost:3000
      - JWT_SECRET=glyph-dev-jwt-secret
      - GOOGLE_CLIENT_ID=local-google-client-id
      - GOOGLE_CLIENT_SECRET=local-google-client-secret
      - GOOGLE_REDIRECT_URL=http://localhost:4000/auth/google/callback
      - GITHUB_CLIENT_ID=local-github-client-id
      - GITHUB_CLIENT_SECRET=local-github-client-secret
      - GITHUB_REDIRECT_URL=http://localhost:4000/auth/github/callback
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - db
      - redis

volumes:
  pgdata:
  redisdata:
